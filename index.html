<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SHERIFF LUCAS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

/* ── SCENE ─────────────────────────────────────────── */
#scene {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 0;
}

/* ── FULLSCREEN FLASH PANELS ───────────────────────── */
#fl, #fr {
  position: fixed; top: 0; bottom: 0; width: 50%;
  pointer-events: none; opacity: 0;
  will-change: opacity;
}
#fl { left: 0; }
#fr { right: 0; }
#fl.on { opacity: 1; }
#fr.on { opacity: 1; }

/* ── VIGNETTE ──────────────────────────────────────── */
#vig {
  position: fixed; inset: 0; z-index: 5; pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.82) 100%);
}

/* ── SCANLINES ─────────────────────────────────────── */
#scan {
  position: fixed; inset: 0; z-index: 200; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px,
    rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 3px);
}

/* ── CORNER LABELS ─────────────────────────────────── */
.corner {
  position: fixed; z-index: 20;
  font-family: 'Rajdhani', sans-serif; font-weight: 600;
  font-size: 10px; letter-spacing: 0.28em;
  color: rgba(255,255,255,0.1); text-transform: uppercase;
  user-select: none;
}
.corner.tl { top: 18px; left: 18px; }
.corner.tr { top: 18px; right: 18px; text-align: right; }
.corner.bl { bottom: 18px; left: 18px; }
.corner.br { bottom: 18px; right: 18px; font-variant-numeric: tabular-nums; }

/* ── BADGE ─────────────────────────────────────────── */
#badge {
  z-index: 10; user-select: none; flex-shrink: 0;
  margin-bottom: 16px;
}
#badge img {
  width: clamp(200px, 44vw, 270px);
  height: clamp(200px, 44vw, 270px);
  display: block; object-fit: contain;
  filter: drop-shadow(0 3px 8px rgba(0,0,0,0.97))
          drop-shadow(0 0 18px rgba(200,160,40,0.35));
  transition: filter 0.35s;
}
.lit-badge img {
  filter: drop-shadow(0 3px 8px rgba(0,0,0,0.97))
          drop-shadow(0 0 35px rgba(255,210,55,0.95))
          drop-shadow(0 0 70px rgba(255,160,0,0.6)) !important;
  animation: badge-spin 14s linear infinite;
}
@keyframes badge-spin { to { transform: rotate(360deg); } }

/* ── NAMEPLATE ─────────────────────────────────────── */
#nameplate {
  z-index: 10; text-align: center;
  flex-shrink: 0; margin-bottom: 0; user-select: none;
}
.sub-sheriff {
  display: block;
  font-family: 'Orbitron', sans-serif; font-weight: 700;
  font-size: clamp(12px, 2.8vw, 17px); letter-spacing: 0.48em;
  color: rgba(180, 200, 255, 0.55);
  text-shadow: 0 0 14px rgba(100,150,255,0.4);
  text-transform: uppercase; margin-bottom: 4px;
}
#lucas-img {
  display: block; margin: 0 auto;
  width: clamp(210px, 54vw, 400px); height: auto;
  filter: drop-shadow(0 3px 0 rgba(0,0,0,0.97))
          drop-shadow(0 0 16px rgba(220,195,130,0.12));
  transition: filter 0.3s;
}
.lit-name #lucas-img {
  animation: lucas-glow 0.52s infinite alternate;
}
@keyframes lucas-glow {
  0%   { filter: drop-shadow(0 3px 0 rgba(0,0,0,0.97)) drop-shadow(0 0 45px rgba(255,175,35,0.65)) drop-shadow(0 0 90px rgba(255,130,0,0.32)); }
  100% { filter: drop-shadow(0 3px 0 rgba(0,0,0,0.97)) drop-shadow(0 0 75px rgba(255,215,75,0.9)) drop-shadow(0 0 140px rgba(255,165,0,0.5)); }
}
.sub-auth {
  display: block;
  font-family: 'Rajdhani', sans-serif; font-weight: 600;
  font-size: clamp(8px, 1.4vw, 10px); letter-spacing: 0.45em;
  color: rgba(255,255,255,0.1); text-transform: uppercase;
  margin-top: 6px; margin-bottom: 4px;
}

/* ── THREE MODE BUTTONS ────────────────────────────── */
#btns {
  z-index: 10; flex-shrink: 0;
  display: flex; gap: clamp(16px, 5vw, 32px);
  align-items: flex-start; justify-content: center;
  margin-top: 24px;
}

.mbtn {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  border: none; background: none; padding: 0; cursor: pointer;
  -webkit-tap-highlight-color: transparent; outline: none;
  transition: transform 0.1s cubic-bezier(0.34,1.5,0.64,1);
}
.mbtn:active { transform: scale(0.86); }

.mbtn .ring {
  width: clamp(72px, 17vw, 96px);
  height: clamp(72px, 17vw, 96px);
  border-radius: 50%;
  background: radial-gradient(circle at 38% 30%, #1e1e2e, #0a0a12);
  border: 2px solid rgba(255,255,255,0.07);
  box-shadow:
    0 0 0 3px #141420,
    0 0 0 5px #0e0e18,
    0 6px 26px rgba(0,0,0,0.95),
    inset 0 1px 0 rgba(255,255,255,0.07),
    inset 0 -2px 8px rgba(0,0,0,0.7);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 2px;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  position: relative; overflow: hidden;
}
.mbtn .ring::after {
  content: '';
  position: absolute; top: 7%; left: 13%;
  width: 36%; height: 24%;
  background: radial-gradient(ellipse, rgba(255,255,255,0.07), transparent);
  border-radius: 50%;
}
.mbtn .icon { font-size: clamp(22px, 5vw, 30px); line-height: 1; pointer-events: none; }
.mbtn .tag  {
  font-family: 'Orbitron', sans-serif; font-weight: 700;
  font-size: clamp(6px, 1.2vw, 8px); letter-spacing: 0.18em;
  color: rgba(255,255,255,0.2); text-transform: uppercase; pointer-events: none;
}
.mbtn .lbl  {
  font-family: 'Orbitron', sans-serif; font-weight: 700;
  font-size: clamp(8px, 1.6vw, 10px); letter-spacing: 0.22em;
  color: rgba(255,255,255,0.16); text-transform: uppercase; pointer-events: none;
  transition: color 0.2s;
}

/* Police ON */
.mbtn[data-m="police"].on .ring {
  border-color: #2255ff;
  background: radial-gradient(circle at 38% 30%, #0a1238, #050818);
  animation: ring-police 0.52s infinite alternate;
}
@keyframes ring-police {
  0%   { box-shadow: 0 0 0 3px #141420, 0 0 0 5px #0e0e18, 0 6px 26px rgba(0,0,0,.95),
         inset 0 1px 0 rgba(255,255,255,.07), inset 0 -2px 8px rgba(0,0,0,.7),
         0 0 30px 8px rgba(255,22,22,.55); }
  100% { box-shadow: 0 0 0 3px #141420, 0 0 0 5px #0e0e18, 0 6px 26px rgba(0,0,0,.95),
         inset 0 1px 0 rgba(255,255,255,.07), inset 0 -2px 8px rgba(0,0,0,.7),
         0 0 30px 8px rgba(22,80,255,.55); }
}
.mbtn[data-m="police"].on .tag,
.mbtn[data-m="police"].on .lbl { color: #7aabff; }

/* Fire ON */
.mbtn[data-m="fire"].on .ring {
  border-color: #ff6600;
  background: radial-gradient(circle at 38% 30%, #1e0800, #0a0300);
  animation: ring-fire 0.38s infinite alternate;
}
@keyframes ring-fire {
  0%   { box-shadow: 0 0 0 3px #141420, 0 0 0 5px #0e0e18, 0 6px 26px rgba(0,0,0,.95),
         inset 0 1px 0 rgba(255,255,255,.07), inset 0 -2px 8px rgba(0,0,0,.7),
         0 0 30px 8px rgba(255,80,0,.35); }
  100% { box-shadow: 0 0 0 3px #141420, 0 0 0 5px #0e0e18, 0 6px 26px rgba(0,0,0,.95),
         inset 0 1px 0 rgba(255,255,255,.07), inset 0 -2px 8px rgba(0,0,0,.7),
         0 0 46px 14px rgba(255,80,0,.65); }
}
.mbtn[data-m="fire"].on .tag,
.mbtn[data-m="fire"].on .lbl { color: #ffaa66; }

/* EMS ON */
.mbtn[data-m="ems"].on .ring {
  border-color: #cc2222;
  background: radial-gradient(circle at 38% 30%, #180404, #080101);
  animation: ring-ems 0.5s infinite alternate;
}
@keyframes ring-ems {
  0%   { box-shadow: 0 0 0 3px #141420, 0 0 0 5px #0e0e18, 0 6px 26px rgba(0,0,0,.95),
         inset 0 1px 0 rgba(255,255,255,.07), inset 0 -2px 8px rgba(0,0,0,.7),
         0 0 30px 8px rgba(255,28,28,.4); }
  100% { box-shadow: 0 0 0 3px #141420, 0 0 0 5px #0e0e18, 0 6px 26px rgba(0,0,0,.95),
         inset 0 1px 0 rgba(255,255,255,.07), inset 0 -2px 8px rgba(0,0,0,.7),
         0 0 46px 14px rgba(255,255,255,.35); }
}
.mbtn[data-m="ems"].on .tag,
.mbtn[data-m="ems"].on .lbl { color: #ff8888; }

/* ── STATUS LINE ───────────────────────────────────── */
#status {
  z-index: 10; margin-top: 18px; flex-shrink: 0;
  font-family: 'Rajdhani', sans-serif; font-weight: 600;
  font-size: clamp(9px, 1.8vw, 12px); letter-spacing: 0.55em;
  color: rgba(255,255,255,0.1); text-transform: uppercase; user-select: none;
}
#status.on { animation: sblink 0.9s infinite; }
@keyframes sblink { 0%,100%{opacity:1} 50%{opacity:0.28} }

/* ── FX CANVAS ─────────────────────────────────────── */
#fxc {
  position: fixed; inset: 0; z-index: 7;
  pointer-events: none; opacity: 0;
  transition: opacity 0.4s;
  will-change: transform;
}
#fxc.on { opacity: 1; }
</style>
</head>

  <canvas id="fxc"></canvas>

<script>
/* ─────────────────────────────────────────────────────
   CONFIGURATION
───────────────────────────────────────────────────── */
var CFG = {
  police: {
    leftBg:  'radial-gradient(ellipse at 20% 50%, #ff1010 0%, #880000 60%, #1a0000 100%)',
    rightBg: 'radial-gradient(ellipse at 80% 50%, #1244ff 0%, #001099 60%, #000220 100%)',
    /* RR gap BB gap RR gap BB gap — classic US double-flash */
    strobe: [
      [1,0, 65],[0,0, 50],[1,0, 65],[0,0, 90],
      [0,1, 65],[0,0, 50],[0,1, 65],[0,0, 90]
    ],
    siren:  'yelp',
    corner: 'COUNTY SHERIFF',
    status: '\u25CF POLICE RESPONDING'
  },
  fire: {
    leftBg:  'radial-gradient(ellipse at 20% 50%, #ff2200 0%, #991100 60%, #220500 100%)',
    rightBg: 'radial-gradient(ellipse at 80% 50%, #ffaa00 0%, #885500 60%, #1a0e00 100%)',
    /* red — amber — white pulse */
    strobe: [
      [1,0, 60],[0,0, 42],[0,1, 60],[0,0, 42],[1,1, 55],[0,0, 60]
    ],
    siren:  'fireq',
    corner: 'FIRE DEPARTMENT',
    status: '\u25CF FIRE RESPONSE'
  },
  ems: {
    leftBg:  'radial-gradient(ellipse at 20% 50%, #ff1212 0%, #880000 60%, #1a0000 100%)',
    rightBg: 'radial-gradient(ellipse at 80% 50%, #ffffff 0%, #aaaaaa 60%, #333333 100%)',
    /* red — white */
    strobe: [
      [1,0, 72],[0,0, 52],[0,1, 72],[0,0, 52]
    ],
    siren:  'wail',
    corner: 'EMS UNIT',
    status: '\u25CF EMS RESPONDING'
  }
};

/* white flash for fire */
var WHITE_BG = 'radial-gradient(ellipse at center, #ffffff 0%, #cccccc 50%, #555 100%)';

/* ─────────────────────────────────────────────────────
   DOM REFS
───────────────────────────────────────────────────── */
var flEl    = document.getElementById('fl');
var frEl    = document.getElementById('fr');
var badgeEl = document.getElementById('badge');
var nameEl  = document.getElementById('nameplate');
var statusEl= document.getElementById('status');
var ctlEl   = document.getElementById('ctl');

/* ─────────────────────────────────────────────────────
   STATE
───────────────────────────────────────────────────── */
var activeMode = null;
var strobeTimer = null;
var strobeStep  = 0;

/* ─────────────────────────────────────────────────────
   AUDIO ENGINE  (robust: killSiren before any startSiren)
───────────────────────────────────────────────────── */
var AC = null;
var sirenTimers = [];
var sirenNodes  = null;

function getAC() {
  if (!AC || AC.state === 'closed')
    AC = new (window.AudioContext || window.webkitAudioContext)();
  if (AC.state === 'suspended') AC.resume();
  return AC;
}

function distCurve(k) {
  var n = 512, c = new Float32Array(n);
  for (var i = 0; i < n; i++) {
    var x = (i * 2) / n - 1;
    c[i] = (Math.PI + k) * x / (Math.PI + k * Math.abs(x));
  }
  return c;
}

function killSiren() {
  sirenTimers.forEach(function(t){ clearTimeout(t); });
  sirenTimers = [];
  if (sirenNodes) {
    try {
      sirenNodes.g.gain.cancelScheduledValues(0);
      sirenNodes.g.gain.setValueAtTime(0, AC ? AC.currentTime : 0);
      sirenNodes.o.stop();
      sirenNodes.s.stop();
      sirenNodes.h.stop();
    } catch(e) {}
    sirenNodes = null;
  }
}

function startSiren(type) {
  killSiren();
  var ac = getAC();

  /* master gain */
  var g = ac.createGain();
  g.gain.setValueAtTime(0, ac.currentTime);
  g.gain.linearRampToValueAtTime(0.36, ac.currentTime + 0.05);

  /* compressor */
  var cmp = ac.createDynamicsCompressor();
  cmp.threshold.value = -10; cmp.ratio.value = 10;
  cmp.attack.value = 0.001;  cmp.release.value = 0.08;
  g.connect(cmp); cmp.connect(ac.destination);

  /* oscillators */
  var o = ac.createOscillator(); o.type = 'sawtooth';
  var dist = ac.createWaveShaper();
  dist.curve = distCurve(type === 'fireq' ? 180 : 65);
  dist.oversample = '4x';
  var go = ac.createGain(); go.gain.value = 0.60;
  o.connect(dist); dist.connect(go); go.connect(g);

  var s = ac.createOscillator(); s.type = 'sine';
  var gs = ac.createGain(); gs.gain.value = 0.22;
  s.connect(gs); gs.connect(g);

  var h = ac.createOscillator(); h.type = 'triangle';
  var gh = ac.createGain(); gh.gain.value = 0.07;
  h.connect(gh); gh.connect(g);

  o.start(); s.start(); h.start();
  sirenNodes = { o:o, s:s, h:h, g:g };
  var myRef = sirenNodes;

  function alive() { return sirenNodes === myRef; }
  function sched(fn, ms) {
    var t = setTimeout(function(){ if (alive()) fn(); }, ms);
    sirenTimers.push(t);
  }

  /* ── YELP: Federal Signal PA300 ──
     580 → 1260 Hz in 0.22 s, repeating                    */
  if (type === 'yelp') {
    (function sweep() {
      if (!alive()) return;
      var now = ac.currentTime, LO = 580, HI = 1260, T = 0.22;
      [[o,1],[s,0.5],[h,1.5]].forEach(function(p) {
        p[0].frequency.cancelScheduledValues(now);
        p[0].frequency.setValueAtTime(LO*p[1], now);
        p[0].frequency.exponentialRampToValueAtTime(HI*p[1], now+T);
        p[0].frequency.exponentialRampToValueAtTime(LO*p[1], now+T*2);
      });
      sched(sweep, T*2*1000);
    })();

  /* ── FIRE Q: Federal Q2B mechanical siren ──
     wind-up 160→720 Hz, burst yelps, wind-down, repeat      */
  } else if (type === 'fireq') {
    (function run(ph) {
      if (!alive()) return;
      var now = ac.currentTime;
      if (ph === 0) {
        [[o,1],[s,0.5],[h,1.8]].forEach(function(p) {
          p[0].frequency.cancelScheduledValues(now);
          p[0].frequency.setValueAtTime(160*p[1], now);
          p[0].frequency.exponentialRampToValueAtTime(720*p[1], now+2.0);
        });
        g.gain.cancelScheduledValues(now);
        g.gain.setValueAtTime(0.05, now);
        g.gain.linearRampToValueAtTime(0.38, now+0.3);
        sched(function(){ run(1); }, 2100);
      } else if (ph === 1) {
        var cnt = 0;
        (function burst() {
          if (!alive()) return;
          if (cnt >= 5) { sched(function(){ run(2); }, 0); return; }
          var t2 = ac.currentTime, LO = 400, HI = 780, T = 0.16;
          [[o,1],[s,0.5],[h,1.8]].forEach(function(p) {
            p[0].frequency.cancelScheduledValues(t2);
            p[0].frequency.setValueAtTime(LO*p[1], t2);
            p[0].frequency.exponentialRampToValueAtTime(HI*p[1], t2+T);
            p[0].frequency.exponentialRampToValueAtTime(LO*p[1], t2+T*2);
          });
          cnt++;
          sched(burst, T*2*1000);
        })();
      } else {
        var t3 = ac.currentTime;
        [[o,1],[s,0.5],[h,1.8]].forEach(function(p) {
          p[0].frequency.cancelScheduledValues(t3);
          p[0].frequency.setValueAtTime(720*p[1], t3);
          p[0].frequency.exponentialRampToValueAtTime(160*p[1], t3+1.5);
        });
        g.gain.cancelScheduledValues(t3);
        g.gain.linearRampToValueAtTime(0.07, t3+1.5);
        sched(function(){ run(0); }, 1800);
      }
    })(0);

  /* ── WAIL: Whelen 295 yelp+wail combo ──
     3 fast yelps → 1 long wail sweep, repeat               */
  } else if (type === 'wail') {
    var cyc = 0;
    (function run() {
      if (!alive()) return;
      var now = ac.currentTime;
      if (cyc < 6) {
        var LO=700, HI=1400, T=0.18;
        [[o,1],[s,0.5],[h,1.5]].forEach(function(p) {
          p[0].frequency.cancelScheduledValues(now);
          p[0].frequency.setValueAtTime(LO*p[1], now);
          p[0].frequency.exponentialRampToValueAtTime(HI*p[1], now+T);
          p[0].frequency.exponentialRampToValueAtTime(LO*p[1], now+T*2);
        });
        cyc++;
        sched(run, T*2*1000);
      } else {
        [[o,660,1550],[s,330,775],[h,990,2325]].forEach(function(p) {
          p[0].frequency.cancelScheduledValues(now);
          p[0].frequency.setValueAtTime(p[1], now);
          p[0].frequency.exponentialRampToValueAtTime(p[2], now+3.0);
        });
        cyc = 0;
        sched(function() {
          if (!alive()) return;
          var t2 = ac.currentTime;
          [[o,660,1550],[s,330,775],[h,990,2325]].forEach(function(p) {
            p[0].frequency.cancelScheduledValues(t2);
            p[0].frequency.setValueAtTime(p[2], t2);
            p[0].frequency.exponentialRampToValueAtTime(p[1], t2+0.1);
          });
          sched(run, 180);
        }, 3100);
      }
    })();
  }
}

/* ─────────────────────────────────────────────────────
   LIGHTS  (strobe engine)
───────────────────────────────────────────────────── */
function runStrobe() {
  if (!activeMode) return;
  var steps = CFG[activeMode].strobe;
  var step  = steps[strobeStep % steps.length];
  var l = step[0], r = step[1], dur = step[2];

  if (activeMode === 'fire' && l === 1 && r === 1) {
    flEl.style.background = WHITE_BG;
    frEl.style.background = WHITE_BG;
    flEl.classList.add('on');
    frEl.classList.add('on');
  } else {
    if (activeMode === 'fire') {
      flEl.style.background = CFG.fire.leftBg;
      frEl.style.background = CFG.fire.rightBg;
    }
    l ? flEl.classList.add('on') : flEl.classList.remove('on');
    r ? frEl.classList.add('on') : frEl.classList.remove('on');
  }
  strobeStep++;
  strobeTimer = setTimeout(runStrobe, dur);
}

function startLights(mode) {
  flEl.style.background = CFG[mode].leftBg;
  frEl.style.background = CFG[mode].rightBg;
  strobeStep = 0;
  runStrobe();
}

function stopLights() {
  clearTimeout(strobeTimer);
  strobeTimer = null;
  flEl.classList.remove('on');
  frEl.classList.remove('on');
}

/* ─────────────────────────────────────────────────────
   MODE HANDLER
───────────────────────────────────────────────────── */
function tap(mode, btn) {
  if (activeMode === mode) {
    /* toggle OFF */
    off();
    return;
  }
  /* switch (or first activation) */
  killSiren();
  stopLights();
  activeMode = mode;

  /* buttons */
  document.querySelectorAll('.mbtn').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');

  /* lights + siren + fx */
  startLights(mode);
  startSiren(CFG[mode].siren);
  startFx(mode);

  /* ui */
  badgeEl.classList.add('lit-badge');
  nameEl.classList.add('lit-name');
  statusEl.textContent = CFG[mode].status;
  statusEl.classList.add('on');
  ctlEl.textContent = CFG[mode].corner;
}

function off() {
  killSiren();
  stopLights();
  stopFx();
  activeMode = null;
  document.querySelectorAll('.mbtn').forEach(function(b){ b.classList.remove('on'); });
  badgeEl.classList.remove('lit-badge');
  nameEl.classList.remove('lit-name');
  statusEl.textContent = 'STANDBY';
  statusEl.classList.remove('on');
  ctlEl.textContent = 'COUNTY SHERIFF';
}

/* ─────────────────────────────────────────────────────
   CLOCK
───────────────────────────────────────────────────── */
function tick() {
  var d = new Date();
  document.getElementById('clk').textContent =
    [d.getHours(), d.getMinutes(), d.getSeconds()]
      .map(function(n){ return String(n).padStart(2,'0'); })
      .join(':');
}
tick();
setInterval(tick, 1000);

/* ─────────────────────────────────────────────────────
   PARTICLE FX
   police  → hyperspace speed streaks
   fire    → ember sparks
   ems     → rising cross / plus symbols
───────────────────────────────────────────────────── */
var fxCanvas  = document.getElementById('fxc');
var fc        = fxCanvas.getContext('2d');
var fxRunning = false;
var fxType    = null;
var fxParts   = [];
var fxRaf     = null;
var fxLast    = 0;

function fxResize() {
  fxCanvas.width  = window.innerWidth;
  fxCanvas.height = window.innerHeight;
}
fxResize();
window.addEventListener('resize', fxResize);

function fxSpawn() {
  var W = fxCanvas.width, H = fxCanvas.height;
  var cx = W / 2, cy = H / 2;

  if (fxType === 'speed') {
    var ang = Math.random() * Math.PI * 2;
    var sr  = 15 + Math.random() * 25;
    return {
      x: cx + Math.cos(ang) * sr,
      y: cy + Math.sin(ang) * sr,
      ang: ang, spd: 0, acc: 0.55 + Math.random() * 1.1,
      life: 1, decay: 0.02 + Math.random() * 0.015,
      len: 3, maxLen: 70 + Math.random() * 110,
      r: 170 + Math.random() * 85 | 0,
      g: 190 + Math.random() * 65 | 0,
      b: 255, t: 'speed'
    };
  }

  if (fxType === 'fire') {
    return {
      x: Math.random() * W,
      y: H + 8,
      vx: (Math.random() - 0.5) * 2.2,
      vy: -(2 + Math.random() * 4.5),
      life: 1, decay: 0.009 + Math.random() * 0.014,
      sz: 1.4 + Math.random() * 3.8,
      r: 255,
      g: Math.random() < 0.5 ? (55 + Math.random() * 75 | 0) : (150 + Math.random() * 80 | 0),
      b: 0,
      wob: Math.random() * Math.PI * 2,
      ws:  0.07 + Math.random() * 0.1,
      t: 'fire'
    };
  }

  if (fxType === 'heal') {
    return {
      x: Math.random() * W,
      y: H * 0.78 + Math.random() * H * 0.22,
      vx: (Math.random() - 0.5) * 1.1,
      vy: -(0.8 + Math.random() * 2.2),
      life: 1, decay: 0.006 + Math.random() * 0.009,
      sz: 4 + Math.random() * 7,
      green: Math.random() < 0.6,
      rot: Math.random() * Math.PI * 0.5,
      t: 'heal'
    };
  }
}

function fxDraw(ts) {
  if (!fxRunning) return;
  /* throttle to ~40 fps */
  if (ts - fxLast < 24) { fxRaf = requestAnimationFrame(fxDraw); return; }
  fxLast = ts;

  var W = fxCanvas.width, H = fxCanvas.height;
  fc.clearRect(0, 0, W, H);

  /* spawn */
  var rate = fxType === 'speed' ? 0.60 : fxType === 'fire' ? 0.55 : 0.32;
  if (Math.random() < rate)       fxParts.push(fxSpawn());
  if (fxType === 'fire' && Math.random() < 0.25) fxParts.push(fxSpawn());

  var max = fxType === 'speed' ? 90 : fxType === 'fire' ? 100 : 45;
  if (fxParts.length > max) fxParts.splice(0, fxParts.length - max);

  fxParts.forEach(function(p) {
    p.life -= p.decay;
    if (p.life <= 0) return;
    var a = p.life;

    if (p.t === 'speed') {
      p.spd += p.acc;
      p.x += Math.cos(p.ang) * p.spd;
      p.y += Math.sin(p.ang) * p.spd;
      p.len = Math.min(p.len + p.spd * 1.6, p.maxLen);
      var tx = p.x - Math.cos(p.ang) * p.len;
      var ty = p.y - Math.sin(p.ang) * p.len;
      var gr = fc.createLinearGradient(tx, ty, p.x, p.y);
      gr.addColorStop(0, 'rgba(' + p.r + ',' + p.g + ',' + p.b + ',0)');
      gr.addColorStop(0.6, 'rgba(' + p.r + ',' + p.g + ',' + p.b + ',' + (a * 0.38) + ')');
      gr.addColorStop(1, 'rgba(255,255,255,' + (a * 0.92) + ')');
      fc.beginPath(); fc.moveTo(tx, ty); fc.lineTo(p.x, p.y);
      fc.strokeStyle = gr;
      fc.lineWidth = 0.6 + a * 1.1;
      fc.stroke();
      /* bright tip */
      fc.beginPath(); fc.arc(p.x, p.y, a * 1.3, 0, Math.PI * 2);
      fc.fillStyle = 'rgba(255,255,255,' + (a * 0.75) + ')';
      fc.fill();

    } else if (p.t === 'fire') {
      p.wob += p.ws;
      p.x   += p.vx + Math.sin(p.wob) * 0.5;
      p.y   += p.vy; p.vy *= 0.997;
      var gr2 = fc.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.sz * 2.4 * a);
      gr2.addColorStop(0, 'rgba(' + p.r + ',' + p.g + ',' + p.b + ',' + (a * 0.9) + ')');
      gr2.addColorStop(0.4, 'rgba(' + p.r + ',' + (p.g >> 1) + ',0,' + (a * 0.5) + ')');
      gr2.addColorStop(1, 'rgba(255,0,0,0)');
      fc.beginPath(); fc.arc(p.x, p.y, p.sz * 2.4 * a, 0, Math.PI * 2);
      fc.fillStyle = gr2; fc.fill();
      /* core */
      fc.beginPath(); fc.arc(p.x, p.y, p.sz * a * 0.6, 0, Math.PI * 2);
      fc.fillStyle = 'rgba(255,255,' + (p.g > 100 ? 160 : 50) + ',' + a + ')';
      fc.fill();

    } else if (p.t === 'heal') {
      p.x += p.vx; p.y += p.vy;
      var s = p.sz * a;
      var col = p.green
        ? 'rgba(55,255,110,' + (a * 0.88) + ')'
        : 'rgba(255,70,70,'  + (a * 0.88) + ')';
      fc.save();
      fc.translate(p.x, p.y); fc.rotate(p.rot);
      fc.fillStyle = col;
      fc.fillRect(-s * 1.15, -s * 0.32, s * 2.3,  s * 0.64);
      fc.fillRect(-s * 0.32, -s * 1.15, s * 0.64, s * 2.3);
      /* glow halo */
      fc.globalAlpha = a * 0.16;
      var gr3 = fc.createRadialGradient(0, 0, 0, 0, 0, s * 2.0);
      gr3.addColorStop(0, p.green ? 'rgba(55,255,110,1)' : 'rgba(255,70,70,1)');
      gr3.addColorStop(1, 'rgba(0,0,0,0)');
      fc.beginPath(); fc.arc(0, 0, s * 2.0, 0, Math.PI * 2);
      fc.fillStyle = gr3; fc.fill();
      fc.restore(); fc.globalAlpha = 1;
    }
  });

  fxParts = fxParts.filter(function(p) { return p.life > 0; });
  fxRaf = requestAnimationFrame(fxDraw);
}

var FX_MAP = { police: 'speed', fire: 'fire', ems: 'heal' };

function startFx(mode) {
  fxType   = FX_MAP[mode];
  fxParts  = [];
  fxLast   = 0;
  fxRunning = true;
  fxCanvas.classList.add('on');
  fxRaf = requestAnimationFrame(fxDraw);
}

function stopFx() {
  fxRunning = false;
  fxCanvas.classList.remove('on');
  cancelAnimationFrame(fxRaf);
  fc.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
  fxParts = [];
}

</script>
</body>
</html>
